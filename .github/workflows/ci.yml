# CI — the loop nobody can skip.
# Mirrors the local gates deterministically: if it isn't green here, it isn't
# done, regardless of what any agent or human claims.
#
# Stack: Kotlin/Spring Boot backend (Maven) + React/Vite frontend (pnpm)
name: ci

on:
  push:
    branches: [main, master, mvp-implementation]
  pull_request:

jobs:
  # Frontend: lint, typecheck, unit tests, build
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firefly-fe
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Pinned to the version used locally so lockfile resolution and
          # supply-chain policies (minimumReleaseAge) behave identically.
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: pnpm run test:run

      - name: Build
        run: pnpm run build

  # Backend: compile + unit tests (Maven, Java 25 — matches pom.xml java.version)
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firefly-be
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Compile
        run: ./mvnw compile --no-transfer-progress

      - name: Unit tests (no Spring context)
        run: ./mvnw test -Dtest="JwtServiceTest,RegisterRequestValidationTest,UserEntityTest,Memory*Test" --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: be-test-report
          path: firefly-be/target/surefire-reports/
          if-no-files-found: ignore

  # Traceability and trajectory (project-factory gates)
  trace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Traceability chain
        run: node scripts/check-traceability.mjs

      - name: Trajectory process audit
        run: node scripts/check-trajectory.mjs

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidence
          path: |
            docs/qa/traceability-report.md
            docs/qa/trajectory-report.md
            trace/trace.json
            trace/trajectory.json
          if-no-files-found: ignore
