spring.application.name=firefly-be
server.port=8080

# Database (uses env vars for Docker, with local fallback)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/firefly}
spring.datasource.username=${DB_USER:firefly}
spring.datasource.password=${DB_PASSWORD:firefly}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# JWT
app.jwt.secret=${JWT_SECRET:svitlyachok-secret-key-change-in-production-min-32-chars}
app.jwt.expiration-ms=86400000

# Disable Spring Security auto-config page
spring.security.user.password=disabled
